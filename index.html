<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Continental: los novios y sus mujeres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Continental: los novios y sus mujeres">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      padding: 20px;
      background: #f0f8ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen;
    }
    .card {
      margin-bottom: 20px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeIn 0.5s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mb-4">Continental: los novios y sus mujeres</h1>

    <!-- Sección de Configuración Inicial -->
    <div id="configSection" class="card">
      <div class="card-header">Configuración Inicial</div>
      <div class="card-body">
        <form id="configForm">
          <div class="form-group">
            <label>Andrea</label>
            <input type="number" step="0.1" class="form-control" id="inputAndrea" required>
          </div>
          <div class="form-group">
            <label>Manolo</label>
            <input type="number" step="0.1" class="form-control" id="inputManolo" required>
          </div>
          <div class="form-group">
            <label>Ricky</label>
            <input type="number" step="0.1" class="form-control" id="inputRicky" required>
          </div>
          <div class="form-group">
            <label>Txus</label>
            <input type="number" step="0.1" class="form-control" id="inputTxus" required>
          </div>
          <button type="submit" class="btn btn-primary">Guardar Configuración</button>
        </form>
      </div>
    </div>

    <!-- Sección de Registro de Partidas y Resumen -->
    <div id="gameSection" style="display: none;">
      <!-- Registro de Partida -->
      <div class="card">
        <div class="card-header">Registrar Partida</div>
        <div class="card-body">
          <form id="roundForm">
            <div class="form-row">
              <div class="form-group col-md-3">
                <label>Andrea</label>
                <input type="number" class="form-control" id="scoreAndrea" required>
              </div>
              <div class="form-group col-md-3">
                <label>Manolo</label>
                <input type="number" class="form-control" id="scoreManolo" required>
              </div>
              <div class="form-group col-md-3">
                <label>Ricky</label>
                <input type="number" class="form-control" id="scoreRicky" required>
              </div>
              <div class="form-group col-md-3">
                <label>Txus</label>
                <input type="number" class="form-control" id="scoreTxus" required>
              </div>
            </div>
            <button type="submit" class="btn btn-success">Registrar Partida</button>
          </form>
        </div>
      </div>

      <!-- Registro de Gasto -->
      <div class="card">
        <div class="card-header">Registrar Gasto</div>
        <div class="card-body">
          <form id="expenseForm">
            <div class="form-row">
              <div class="form-group col-md-4">
                <label>Gasto (€)</label>
                <input type="number" step="0.01" min="0" class="form-control" id="expenseAmount" required>
              </div>
              <div class="form-group col-md-8">
                <label>Descripción</label>
                <input type="text" class="form-control" id="expenseDescription" placeholder="Ej.: cafés, pincho de tortilla, agua..." required>
              </div>
            </div>
            <button type="submit" class="btn btn-warning">Añadir Gasto</button>
          </form>
        </div>
      </div>

      <!-- Resumen y Historial -->
      <div class="card">
        <div class="card-header">Resumen y Historial</div>
        <div class="card-body">
          <h4>Totales Acumulados</h4>
          <ul id="totalsList" class="list-group mb-3"></ul>

          <h4>Gastos Registrados</h4>
          <ul id="expensesList" class="list-group mb-3"></ul>

          <h4>Historial de Partidas</h4>
          <ul id="roundsList" class="list-group"></ul>
        </div>
      </div>

      <div class="mb-3">
        <button id="shareBtn" class="btn btn-info">Enviar Resumen por WhatsApp</button>
      </div>
      <div class="mb-3">
        <button id="resetBtn" class="btn btn-danger">Reiniciar Marcadores</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let data = {
      config: {},
      rounds: [],
      totals: {},
      expenses: []
    };

    const players = ["Andrea", "Manolo", "Ricky", "Txus"];
    const payments = [0, 0.5, 1, 2];

    function formatEuro(value) {
      return (parseFloat(value) || 0).toFixed(2).replace('.', ',') + "€";
    }

    if (localStorage.getItem('continentalData')) {
      data = JSON.parse(localStorage.getItem('continentalData'));

      if (!data.expenses) {
        data.expenses = [];
      }

      document.getElementById('configSection').style.display = 'none';
      document.getElementById('gameSection').style.display = 'block';
      updateTotalsDisplay();
      updateExpensesDisplay();
      updateRoundsDisplay();
    }

    function saveData() {
      localStorage.setItem('continentalData', JSON.stringify(data));
    }

    function animateElement(element) {
      element.classList.add("animate-fade");
      setTimeout(() => element.classList.remove("animate-fade"), 500);
    }

    function updateTotalsDisplay() {
      const totalsList = document.getElementById('totalsList');
      totalsList.innerHTML = "";

      let sortedPlayers = players.slice().sort((a, b) => (data.totals[a] || 0) - (data.totals[b] || 0));

      sortedPlayers.forEach(player => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.textContent = player + ": " + formatEuro(data.totals[player] || 0);
        totalsList.appendChild(li);
      });

      let totalAcumulado = players.reduce((sum, player) => sum + (data.totals[player] || 0), 0);
      const liTotal = document.createElement('li');
      liTotal.className = "list-group-item font-weight-bold";
      liTotal.textContent = "TOTAL ACUMULADO: " + formatEuro(totalAcumulado);
      totalsList.appendChild(liTotal);

      animateElement(totalsList);
    }

    function updateExpensesDisplay() {
      const expensesList = document.getElementById('expensesList');
      expensesList.innerHTML = "";

      if (!data.expenses || data.expenses.length === 0) {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.textContent = "No hay gastos registrados.";
        expensesList.appendChild(li);
        animateElement(expensesList);
        return;
      }

      data.expenses.forEach((expense, index) => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.innerHTML = "<strong>Gasto " + (index + 1) + ":</strong> " + formatEuro(expense.amount) + " - " + expense.description;
        expensesList.appendChild(li);
      });

      const totalGastos = data.expenses.reduce((sum, expense) => sum + expense.amount, 0);
      const liTotal = document.createElement('li');
      liTotal.className = "list-group-item font-weight-bold";
      liTotal.textContent = "TOTAL GASTOS: " + formatEuro(totalGastos);
      expensesList.appendChild(liTotal);

      animateElement(expensesList);
    }

    function updateRoundsDisplay() {
      const roundsList = document.getElementById('roundsList');
      roundsList.innerHTML = "";

      data.rounds.forEach((round, index) => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.innerHTML = "<strong>Ronda " + (index + 1) + ":</strong> " +
          players.map(player => player + " - " + round.scores[player] + " pts, paga " + formatEuro(round.payments[player])).join(" | ");
        roundsList.appendChild(li);
      });

      animateElement(roundsList);
    }

    document.getElementById('configForm').addEventListener('submit', function(e) {
      e.preventDefault();

      players.forEach(player => {
        const input = document.getElementById('input' + player);
        const value = parseFloat(input.value) || 0;
        data.config[player] = value;
        data.totals[player] = value;
      });

      if (!data.expenses) {
        data.expenses = [];
      }

      saveData();
      document.getElementById('configSection').style.display = 'none';
      document.getElementById('gameSection').style.display = 'block';
      updateTotalsDisplay();
      updateExpensesDisplay();
    });

    document.getElementById('roundForm').addEventListener('submit', function(e) {
      e.preventDefault();

      let roundScores = {};

      players.forEach(player => {
        const input = document.getElementById('score' + player);
        const value = parseFloat(input.value) || 0;
        roundScores[player] = value;
        input.value = "";
      });

      let ranking = players.map(player => ({
        player: player,
        score: roundScores[player]
      }));

      ranking.sort((a, b) => a.score - b.score);

      let roundPayments = {};
      ranking.forEach((item, index) => {
        roundPayments[item.player] = payments[index];
        data.totals[item.player] += payments[index];
      });

      data.rounds.push({
        scores: roundScores,
        payments: roundPayments
      });

      saveData();
      updateTotalsDisplay();
      updateRoundsDisplay();
    });

    document.getElementById('expenseForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const amountInput = document.getElementById('expenseAmount');
      const descriptionInput = document.getElementById('expenseDescription');

      const amount = parseFloat(amountInput.value) || 0;
      const description = descriptionInput.value.trim();

      if (amount <= 0 || description === "") {
        alert("Introduce un importe y una descripción válidos.");
        return;
      }

      data.expenses.push({
        amount: amount,
        description: description
      });

      amountInput.value = "";
      descriptionInput.value = "";

      saveData();
      updateExpensesDisplay();
    });

    document.getElementById('shareBtn').addEventListener('click', function() {
      let message = "Resumen Continental:\n\nTotales:\n";

      let sortedPlayers = players.slice().sort((a, b) => (data.totals[a] || 0) - (data.totals[b] || 0));
      sortedPlayers.forEach(player => {
        message += player + ": " + formatEuro(data.totals[player] || 0) + "\n";
      });

      let totalAcumulado = players.reduce((sum, player) => sum + (data.totals[player] || 0), 0);
      message += "TOTAL ACUMULADO: " + formatEuro(totalAcumulado) + "\n";

      if (data.expenses && data.expenses.length > 0) {
        message += "\nGastos:\n";
        data.expenses.forEach((expense, index) => {
          message += (index + 1) + ". " + formatEuro(expense.amount) + " - " + expense.description + "\n";
        });

        const totalGastos = data.expenses.reduce((sum, expense) => sum + expense.amount, 0);
        message += "TOTAL GASTOS: " + formatEuro(totalGastos) + "\n";
      }

      if (data.rounds.length > 0) {
        const lastRound = data.rounds[data.rounds.length - 1];
        message += "\nÚltima Ronda:\n";
        message += players.map(player =>
          player + " (" + lastRound.scores[player] + " pts, paga " + formatEuro(lastRound.payments[player]) + ")"
        ).join(" | ");
      }

      let url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(message);
      window.open(url, '_blank');
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      if (confirm("¿Estás seguro de que deseas reiniciar los marcadores?")) {
        localStorage.removeItem('continentalData');
        location.reload();
      }
    });
  </script>
</body>
</html>
