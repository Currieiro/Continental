<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Continental: los novios y sus mujeres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Continental: los novios y sus mujeres">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      padding: 20px;
      background: #f0f8ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Arial, sans-serif;
    }

    .card {
      margin-bottom: 20px;
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade {
      animation: fadeIn 0.5s ease-in-out;
    }

    .player-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
      margin: 4px 6px 4px 0;
      font-size: 0.95rem;
    }

    .rank-red {
      background-color: #dc3545;
      color: #fff;
    }

    .rank-orange {
      background-color: #fd7e14;
      color: #fff;
    }

    .rank-yellow {
      background-color: #ffc107;
      color: #212529;
    }

    .rank-green {
      background-color: #28a745;
      color: #fff;
    }

    .rank-icon {
      margin: 0 4px 0 2px;
    }

    .summary-line {
      font-weight: 700;
    }

    .premium-toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: #dc3545;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      margin-bottom: 0;
      cursor: pointer;
    }

    .premium-toggle-label input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: #ffffff;
      cursor: pointer;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .round-badge {
      margin-left: 8px;
      vertical-align: middle;
    }

    .app-version {
      text-align: center;
      color: #6c757d;
      font-size: 0.78rem;
      opacity: 0.8;
      margin-top: 10px;
      margin-bottom: 10px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mb-4">Continental: los novios y sus mujeres</h1>

    <!-- Configuración inicial -->
    <div id="configSection" class="card">
      <div class="card-header">Configurar jugadores</div>
      <div class="card-body">
        <form id="configForm">
          <div class="form-group">
            <label for="playerName0">Jugador 1</label>
            <input type="text" class="form-control" id="playerName0" maxlength="20" required>
          </div>
          <div class="form-group">
            <label for="playerName1">Jugador 2</label>
            <input type="text" class="form-control" id="playerName1" maxlength="20" required>
          </div>
          <div class="form-group">
            <label for="playerName2">Jugador 3</label>
            <input type="text" class="form-control" id="playerName2" maxlength="20" required>
          </div>
          <div class="form-group">
            <label for="playerName3">Jugador 4</label>
            <input type="text" class="form-control" id="playerName3" maxlength="20" required>
          </div>
          <button type="submit" class="btn btn-primary">Guardar Jugadores</button>
        </form>
      </div>
    </div>

    <!-- Sección de juego -->
    <div id="gameSection" style="display: none;">
      <!-- Registro de partida -->
      <div class="card">
        <div class="card-header">Registrar Partida</div>
        <div class="card-body">
          <form id="roundForm">
            <div class="form-row">
              <div class="form-group col-md-3">
                <label id="scoreLabel0" for="score0">Jugador 1</label>
                <input type="number" class="form-control" id="score0" required>
              </div>
              <div class="form-group col-md-3">
                <label id="scoreLabel1" for="score1">Jugador 2</label>
                <input type="number" class="form-control" id="score1" required>
              </div>
              <div class="form-group col-md-3">
                <label id="scoreLabel2" for="score2">Jugador 3</label>
                <input type="number" class="form-control" id="score2" required>
              </div>
              <div class="form-group col-md-3">
                <label id="scoreLabel3" for="score3">Jugador 4</label>
                <input type="number" class="form-control" id="score3" required>
              </div>
            </div>

            <div class="action-row">
              <button type="submit" class="btn btn-success">Registrar Partida</button>

              <label class="premium-toggle-label">
                <input type="checkbox" id="premiumRound">
                <span>Partida Premium</span>
              </label>
            </div>
          </form>
        </div>
      </div>

      <!-- Registro de gasto -->
      <div class="card">
        <div class="card-header">Registrar Gasto</div>
        <div class="card-body">
          <form id="expenseForm">
            <div class="form-row">
              <div class="form-group col-md-4">
                <label for="expenseAmount">Gasto (€)</label>
                <input type="number" step="0.01" min="0" class="form-control" id="expenseAmount" required>
              </div>
              <div class="form-group col-md-8">
                <label for="expenseDescription">Descripción</label>
                <input type="text" class="form-control" id="expenseDescription" placeholder="Ej.: cafés, tortilla, agua..." required>
              </div>
            </div>
            <button type="submit" class="btn btn-warning">Añadir Gasto</button>
          </form>
        </div>
      </div>

      <!-- Resumen e historial -->
      <div class="card">
        <div class="card-header">Resumen y Historial</div>
        <div class="card-body">
          <h4>Totales Acumulados</h4>
          <ul id="totalsList" class="list-group mb-3"></ul>

          <div id="expensesSection" style="display: none;">
            <h4>Gastos Registrados</h4>
            <ul id="expensesList" class="list-group mb-3"></ul>
          </div>

          <h4>Historial de Partidas</h4>
          <ul id="roundsList" class="list-group"></ul>
        </div>
      </div>

      <div class="mb-3">
        <button id="shareBtn" class="btn btn-info">Enviar Resumen por WhatsApp</button>
      </div>

      <div class="mb-3">
        <button id="resetBtn" class="btn btn-danger">Reiniciar Marcadores</button>
      </div>
    </div>

    <div id="appVersion" class="app-version"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const APP_VERSION = "v1.6.2";

    const DEFAULT_PLAYER_NAMES = ["Andrea", "Manolo", "Ricky", "Txus"];
    const PLAYER_COUNT = 4;

    const STANDARD_PAYMENTS = [2, 1, 0.5, 0];
    const PREMIUM_PAYMENTS = [5, 2.5, 1, 0];

    const defaultData = {
      setupDone: false,
      playerNames: [...DEFAULT_PLAYER_NAMES],
      rounds: [],
      expenses: []
    };

    function sanitizePlayerNames(names) {
      if (!Array.isArray(names)) return [...DEFAULT_PLAYER_NAMES];

      const cleaned = [];
      for (let i = 0; i < PLAYER_COUNT; i++) {
        const value = (names[i] || "").toString().trim();
        cleaned.push(value || DEFAULT_PLAYER_NAMES[i]);
      }
      return cleaned;
    }

    function migrateLegacyData(saved) {
      const legacyNames =
        saved && Array.isArray(saved.playerNames) ? sanitizePlayerNames(saved.playerNames)
        : saved && saved.config && Object.keys(saved.config).length === PLAYER_COUNT ? Object.keys(saved.config)
        : [...DEFAULT_PLAYER_NAMES];

      const rounds = Array.isArray(saved.rounds) ? saved.rounds.map(round => {
        let scoresArray = [];
        let paymentsArray = [];

        if (Array.isArray(round.scores)) {
          scoresArray = round.scores.slice(0, PLAYER_COUNT).map(v => parseFloat(v) || 0);
        } else {
          scoresArray = legacyNames.map(name => parseFloat(round?.scores?.[name]) || 0);
        }

        if (Array.isArray(round.payments)) {
          paymentsArray = round.payments.slice(0, PLAYER_COUNT).map(v => parseFloat(v) || 0);
        } else {
          paymentsArray = legacyNames.map(name => parseFloat(round?.payments?.[name]) || 0);
        }

        return {
          scores: scoresArray,
          payments: paymentsArray,
          premium: !!round.premium
        };
      }) : [];

      return {
        setupDone: !!saved.setupDone || !!saved.config || !!saved.playerNames || rounds.length > 0 || (Array.isArray(saved.expenses) && saved.expenses.length > 0),
        playerNames: legacyNames,
        rounds: rounds,
        expenses: Array.isArray(saved.expenses) ? saved.expenses : []
      };
    }

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem('continentalData'));
        if (!saved) {
          return JSON.parse(JSON.stringify(defaultData));
        }

        const migrated = migrateLegacyData(saved);

        return {
          setupDone: migrated.setupDone,
          playerNames: sanitizePlayerNames(migrated.playerNames),
          rounds: Array.isArray(migrated.rounds) ? migrated.rounds : [],
          expenses: Array.isArray(migrated.expenses) ? migrated.expenses : []
        };
      } catch (e) {
        return JSON.parse(JSON.stringify(defaultData));
      }
    }

    let data = loadData();

    function saveData() {
      localStorage.setItem('continentalData', JSON.stringify(data));
    }

    function updateVersionDisplay() {
      document.getElementById('appVersion').textContent = "Versión " + APP_VERSION;
    }

    function formatEuro(value) {
      return (parseFloat(value) || 0).toFixed(2).replace('.', ',') + "€";
    }

    function animateElement(element) {
      element.classList.add("animate-fade");
      setTimeout(() => element.classList.remove("animate-fade"), 500);
    }

    function getRankClassByIndex(index) {
      const rankClasses = ["rank-red", "rank-orange", "rank-yellow", "rank-green"];
      return rankClasses[index] || "rank-green";
    }

    function getPositionText(index) {
      return (index + 1) + "º";
    }

    function getRankIcon(index) {
      const icons = ["🏆", "🥈", "🥉", "💩"];
      return icons[index] || "•";
    }

    function getPaymentScale(isPremium) {
      return isPremium ? PREMIUM_PAYMENTS : STANDARD_PAYMENTS;
    }

    function getRankingFromScores(scores) {
      return [0, 1, 2, 3].sort((a, b) => {
        const scoreA = parseFloat(scores[a]) || 0;
        const scoreB = parseFloat(scores[b]) || 0;

        if (scoreB !== scoreA) {
          return scoreB - scoreA;
        }

        return a - b;
      });
    }

    function calculateRoundPayments(scores, isPremium) {
      const paymentScale = getPaymentScale(isPremium);
      const ranking = getRankingFromScores(scores);
      const payments = [0, 0, 0, 0];

      ranking.forEach((playerIndex, rankIndex) => {
        payments[playerIndex] = paymentScale[rankIndex] || 0;
      });

      return payments;
    }

    function normalizeRounds() {
      data.rounds = (data.rounds || []).map(round => {
        const scores = Array.isArray(round.scores)
          ? round.scores.slice(0, PLAYER_COUNT).map(v => parseFloat(v) || 0)
          : [0, 0, 0, 0];

        const premium = !!round.premium;
        const payments = calculateRoundPayments(scores, premium);

        return {
          scores,
          payments,
          premium
        };
      });
    }

    function getTotalsArray() {
      const totals = [0, 0, 0, 0];

      (data.rounds || []).forEach(round => {
        for (let i = 0; i < PLAYER_COUNT; i++) {
          totals[i] += parseFloat(round.payments[i]) || 0;
        }
      });

      return totals;
    }

    function getRankingFromTotals() {
      const totals = getTotalsArray();

      return [0, 1, 2, 3].sort((a, b) => {
        if (totals[b] !== totals[a]) {
          return totals[b] - totals[a];
        }
        return a - b;
      });
    }

    function buildRankMapFromRanking(ranking) {
      const rankMap = {};

      ranking.forEach((playerIndex, index) => {
        rankMap[playerIndex] = {
          className: getRankClassByIndex(index),
          positionText: getPositionText(index),
          position: index + 1,
          icon: getRankIcon(index)
        };
      });

      return rankMap;
    }

    function getTotalAcumulado() {
      return getTotalsArray().reduce((sum, value) => sum + value, 0);
    }

    function getTotalGastos() {
      return (data.expenses || []).reduce((sum, expense) => {
        return sum + (parseFloat(expense.amount) || 0);
      }, 0);
    }

    function getSaldo() {
      return getTotalAcumulado() - getTotalGastos();
    }

    function renderPlayerNames() {
      for (let i = 0; i < PLAYER_COUNT; i++) {
        const name = data.playerNames[i] || DEFAULT_PLAYER_NAMES[i];
        const configInput = document.getElementById("playerName" + i);
        const scoreLabel = document.getElementById("scoreLabel" + i);

        if (configInput) configInput.value = name;
        if (scoreLabel) scoreLabel.textContent = name;
      }
    }

    function updateTotalsDisplay() {
      const totalsList = document.getElementById('totalsList');
      totalsList.innerHTML = "";

      const totals = getTotalsArray();
      const ranking = getRankingFromTotals();
      const rankMap = buildRankMapFromRanking(ranking);

      ranking.forEach(playerIndex => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.innerHTML = `
          <span class="player-pill ${rankMap[playerIndex].className}">
            ${rankMap[playerIndex].positionText}
            <span class="rank-icon">${rankMap[playerIndex].icon}</span>
            ${data.playerNames[playerIndex]}: ${formatEuro(totals[playerIndex])}
          </span>
        `;
        totalsList.appendChild(li);
      });

      const liTotal = document.createElement('li');
      liTotal.className = "list-group-item summary-line";
      liTotal.textContent = "TOTAL ACUMULADO: " + formatEuro(getTotalAcumulado());
      totalsList.appendChild(liTotal);

      const liGastos = document.createElement('li');
      liGastos.className = "list-group-item summary-line";
      liGastos.textContent = "GASTOS: " + formatEuro(getTotalGastos());
      totalsList.appendChild(liGastos);

      const liSaldo = document.createElement('li');
      liSaldo.className = "list-group-item summary-line";
      liSaldo.textContent = "SALDO: " + formatEuro(getSaldo());
      totalsList.appendChild(liSaldo);

      animateElement(totalsList);
    }

    function updateExpensesDisplay() {
      const expensesSection = document.getElementById('expensesSection');
      const expensesList = document.getElementById('expensesList');
      expensesList.innerHTML = "";

      if (!data.expenses || data.expenses.length === 0) {
        expensesSection.style.display = "none";
        return;
      }

      expensesSection.style.display = "block";

      data.expenses.forEach((expense, index) => {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.innerHTML = `<strong>Gasto ${index + 1}:</strong> ${formatEuro(expense.amount)} - ${expense.description}`;
        expensesList.appendChild(li);
      });

      const liTotal = document.createElement('li');
      liTotal.className = "list-group-item summary-line";
      liTotal.textContent = "TOTAL GASTOS: " + formatEuro(getTotalGastos());
      expensesList.appendChild(liTotal);

      animateElement(expensesList);
    }

    function updateRoundsDisplay() {
      const roundsList = document.getElementById('roundsList');
      roundsList.innerHTML = "";

      if (!data.rounds || data.rounds.length === 0) {
        const li = document.createElement('li');
        li.className = "list-group-item";
        li.textContent = "Todavía no hay partidas registradas.";
        roundsList.appendChild(li);
        animateElement(roundsList);
        return;
      }

      data.rounds.forEach((round, index) => {
        const ranking = getRankingFromScores(round.scores || [0, 0, 0, 0]);
        const rankMap = buildRankMapFromRanking(ranking);

        const li = document.createElement('li');
        li.className = "list-group-item";

        const title = round.premium
          ? `<strong>Ronda ${index + 1}:</strong> <span class="badge badge-danger round-badge">Premium</span><br>`
          : `<strong>Ronda ${index + 1}:</strong><br>`;

        li.innerHTML = title + ranking.map(playerIndex =>
          `<span class="player-pill ${rankMap[playerIndex].className}">
            ${rankMap[playerIndex].positionText}
            <span class="rank-icon">${rankMap[playerIndex].icon}</span>
            ${data.playerNames[playerIndex]} - ${round.scores[playerIndex]} pts, paga ${formatEuro(round.payments[playerIndex])}
          </span>`
        ).join("");

        roundsList.appendChild(li);
      });

      animateElement(roundsList);
    }

    function initApp() {
      updateVersionDisplay();
      renderPlayerNames();

      if (data.setupDone) {
        document.getElementById('configSection').style.display = 'none';
        document.getElementById('gameSection').style.display = 'block';
        updateTotalsDisplay();
        updateExpensesDisplay();
        updateRoundsDisplay();
      } else {
        document.getElementById('configSection').style.display = 'block';
        document.getElementById('gameSection').style.display = 'none';
      }
    }

    normalizeRounds();
    saveData();
    initApp();

    document.getElementById('configForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const newNames = [];
      for (let i = 0; i < PLAYER_COUNT; i++) {
        const value = document.getElementById("playerName" + i).value.trim();
        newNames.push(value || DEFAULT_PLAYER_NAMES[i]);
      }

      data.playerNames = sanitizePlayerNames(newNames);
      data.setupDone = true;

      saveData();
      renderPlayerNames();

      document.getElementById('configSection').style.display = 'none';
      document.getElementById('gameSection').style.display = 'block';

      updateTotalsDisplay();
      updateExpensesDisplay();
      updateRoundsDisplay();
      updateVersionDisplay();
    });

    document.getElementById('roundForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const scores = [];
      const isPremium = document.getElementById('premiumRound').checked;

      for (let i = 0; i < PLAYER_COUNT; i++) {
        const input = document.getElementById("score" + i);
        scores.push(parseFloat(input.value) || 0);
        input.value = "";
      }

      const payments = calculateRoundPayments(scores, isPremium);

      data.rounds.push({
        scores,
        payments,
        premium: isPremium
      });

      document.getElementById('premiumRound').checked = false;

      saveData();
      updateTotalsDisplay();
      updateRoundsDisplay();
    });

    document.getElementById('expenseForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const amountInput = document.getElementById('expenseAmount');
      const descriptionInput = document.getElementById('expenseDescription');

      const amount = parseFloat(amountInput.value) || 0;
      const description = descriptionInput.value.trim();

      if (amount <= 0 || description === "") {
        alert("Introduce un importe y una descripción válidos.");
        return;
      }

      data.expenses.push({
        amount: amount,
        description: description
      });

      amountInput.value = "";
      descriptionInput.value = "";

      saveData();
      updateExpensesDisplay();
      updateTotalsDisplay();
    });

    document.getElementById('shareBtn').addEventListener('click', function() {
      let message = "Resumen Continental:\n\nTotales:\n";

      const totals = getTotalsArray();
      const totalsRanking = getRankingFromTotals();
      const totalsRankMap = buildRankMapFromRanking(totalsRanking);

      totalsRanking.forEach(playerIndex => {
        message += `${totalsRankMap[playerIndex].icon} ${totalsRankMap[playerIndex].positionText} ${data.playerNames[playerIndex]}: ${formatEuro(totals[playerIndex])}\n`;
      });

      message += "\nTOTAL ACUMULADO: " + formatEuro(getTotalAcumulado()) + "\n";
      message += "GASTOS: " + formatEuro(getTotalGastos()) + "\n";
      message += "SALDO: " + formatEuro(getSaldo()) + "\n";

      if (data.expenses && data.expenses.length > 0) {
        message += "\nDetalle de gastos:\n";
        data.expenses.forEach((expense, index) => {
          message += (index + 1) + ". " + formatEuro(expense.amount) + " - " + expense.description + "\n";
        });
      }

      if (data.rounds.length > 0) {
        const lastRound = data.rounds[data.rounds.length - 1];
        const roundRanking = getRankingFromScores(lastRound.scores || [0, 0, 0, 0]);
        const roundRankMap = buildRankMapFromRanking(roundRanking);

        message += lastRound.premium ? "\nÚltima Ronda (Premium):\n" : "\nÚltima Ronda:\n";

        message += roundRanking.map(playerIndex => {
          return `${roundRankMap[playerIndex].icon} ${roundRankMap[playerIndex].positionText} ${data.playerNames[playerIndex]} (${lastRound.scores[playerIndex]} pts, paga ${formatEuro(lastRound.payments[playerIndex])})`;
        }).join(" | ");
      }

      const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(message);
      window.open(url, "_blank");
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      if (confirm("¿Estás seguro de que deseas reiniciar los marcadores y los gastos?")) {
        localStorage.removeItem('continentalData');
        location.reload();
      }
    });
  </script>
</body>
</html>
